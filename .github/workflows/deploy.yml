name: Deploy Showcase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no proprietary content
        run: |
          echo "Checking for accidentally committed proprietary content..."
          FAIL=0
          # No source code files
          for ext in py js ts rs go java; do
            if find . -name "*.$ext" -not -path "./.github/*" | grep -q .; then
              echo "ALERT: Found .$ext source files"
              FAIL=1
            fi
          done
          # No model files
          for ext in bin gguf pt pth safetensors h5 pkl; do
            if find . -name "*.$ext" | grep -q .; then
              echo "ALERT: Found .$ext model files"
              FAIL=1
            fi
          done
          # No dependency files
          for f in requirements.txt package.json Pipfile pyproject.toml; do
            if find . -name "$f" | grep -q .; then
              echo "ALERT: Found $f"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "Security check FAILED — proprietary content detected"
            exit 1
          fi
          echo "Security check passed."
